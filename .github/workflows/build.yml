name: Build EXE
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 pyttsx3 speechrecognition openai

      - name: Build EXE
        run: |
          # Ищем main.py по всем папкам и собираем его
          $mainFile = Get-ChildItem -Path . -Filter main.py -Recurse | Select-Object -First 1 -ExpandProperty FullName
          echo "Found file at: $mainFile"
          pyinstaller --onefile $mainFile

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-EXE
          path: dist/*.exe
