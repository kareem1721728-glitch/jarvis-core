name: Build EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 pyttsx3 SpeechRecognition openai

      - name: Find main.py
        shell: pwsh
        run: |
          $mainFile = Get-ChildItem -Path . -Filter main.py -Recurse | Select-Object -First 1
          if (-not $mainFile) {
            Write-Error "main.py not found"
            exit 1
          }
          "MAIN_FILE=$($mainFile.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build EXE
        shell: pwsh
        run: |
          pyinstaller --onefile --clean --noconfirm $env:MAIN_FILE

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-EXE
          path: dist/*.exe
